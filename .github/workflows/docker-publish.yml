# Publishes peek to Docker Hub when a GitHub release is published.
#
# Prerequisites (one-time):
# - GitHub secrets: DOCKER_USERNAME, DOCKER_TOKEN (Docker Hub access token with Read & Write)
# - Docker Hub repository named "peek" under your account
# - Release tag (e.g. v1.0.0) — image is tagged with the release tag and "latest"
name: Publish Docker image

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/peek:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKER_USERNAME }}/peek:latest
